name: Main

on:
  push:
  pull_request:

env:
  QT_VERSION: 6.10.3 # Keep in sync with CMakeLists.txt
  KF_VERSION: v6.26.0 # Ditto
  COMMON_CMAKE_OPTIONS: "-DBUILD_TESTING=OFF -DBUILD_PYTHON_BINDINGS=OFF"

jobs:
  reuse:
    name: "REUSE"
    runs-on: ubuntu-latest

    # Skip running on PR events that come from the same repository, it will just duplicate the branch action
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name

    steps:
    - uses: actions/checkout@v6
    - name: REUSE Compliance Check
      uses: fsfe/reuse-action@v6

  build:
    name: "Build"
    runs-on: windows-latest
    
    # Skip running on PR events that come from the same repository, it will just duplicate the branch action
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: "${{ env.QT_VERSION }}"
        cache: true

    - name: Prepare Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2.1
      with:
        vulkan-query-version: latest
        vulkan-components: Vulkan-Headers, Vulkan-Loader, SPIRV-Cross, SPIRV-Headers
        vulkan-use-cache: true

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
        echo "prefix-dir=${{ github.workspace }}/prefix" >> "$GITHUB_OUTPUT"

    - name: Cache Prefix
      id: cache-prefix-restore
      uses: actions/cache/restore@v5
      with:
        path: ${{ steps.strings.outputs.prefix-dir }}
        key: ${{ runner.os }}-${{ env.QT_VERSION }}-${{ env.KF_VERSION }}-prefix

    - name: Setup Windows dependencies
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        $ProgressPreference = 'SilentlyContinue'

        Invoke-WebRequest https://xiv.zone/distrib/dependencies/gettext.zip -OutFile gettext.zip
        unzip gettext.zip -d ${{ steps.strings.outputs.prefix-dir }}
        
        Invoke-WebRequest https://xiv.zone/distrib/dependencies/iconv.zip -OutFile iconv.zip
        unzip iconv.zip -d ${{ steps.strings.outputs.prefix-dir }}

        Invoke-WebRequest https://xiv.zone/distrib/dependencies/gperf.zip -OutFile gperf.zip
        unzip gperf.zip -d ${{ steps.strings.outputs.prefix-dir }}

        Invoke-WebRequest https://xiv.zone/distrib/dependencies/icoutils.zip -OutFile icoutils.zip
        unzip icoutils.zip -d ${{ steps.strings.outputs.prefix-dir }}
        
        pip install lxml

    - name: Build zlib
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/madler/zlib.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-zlib -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S zlib -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} ${{ env.COMMON_CMAKE_OPTIONS }}
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-zlib --config Release --target install

    - name: Build Extra CMake Modules
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch ${{ env.KF_VERSION }} https://invent.kde.org/frameworks/extra-cmake-modules.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-ECM -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S extra-cmake-modules -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} ${{ env.COMMON_CMAKE_OPTIONS }}
        cmake --install ${{ steps.strings.outputs.build-output-dir }}-ECM --config Release

    - name: Configure KI18n
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch ${{ env.KF_VERSION }} https://invent.kde.org/frameworks/ki18n.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-ki18n -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S ki18n -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} ${{ env.COMMON_CMAKE_OPTIONS }}

    - name: Build KI18n
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-ki18n --config Release --target install

    - name: Build KCoreAddons
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch ${{ env.KF_VERSION }} https://invent.kde.org/frameworks/kcoreaddons.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-kca -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S kcoreaddons -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} ${{ env.COMMON_CMAKE_OPTIONS }}
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-kca --config Release --target install

    - name: Build KConfig
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch ${{ env.KF_VERSION }} https://invent.kde.org/frameworks/kconfig.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-kconfig -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S kconfig -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} ${{ env.COMMON_CMAKE_OPTIONS }}
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-kconfig --config Release --target install

    - name: Build KArchive
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch ${{ env.KF_VERSION }} https://invent.kde.org/frameworks/karchive.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-karchive -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S karchive -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} ${{ env.COMMON_CMAKE_OPTIONS }} -DWITH_BZIP2=OFF -DWITH_LIBLZMA=OFF -DWITH_LIBZSTD=OFF # TODO: enable bzip which we need later
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-karchive --config Release --target install

    - name: Build KItemViews
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch ${{ env.KF_VERSION }} https://invent.kde.org/frameworks/kitemviews.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-kitemviews -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S kitemviews -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} ${{ env.COMMON_CMAKE_OPTIONS }}
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-kitemviews --config Release --target install

    - name: Build KCodecs
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch ${{ env.KF_VERSION }} https://invent.kde.org/frameworks/kcodecs.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-kcodecs -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S kcodecs -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} ${{ env.COMMON_CMAKE_OPTIONS }}
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-kcodecs --config Release --target install

    - name: Build KGuiAddons
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch ${{ env.KF_VERSION }} https://invent.kde.org/frameworks/kguiaddons.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-kguiaddons -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S kguiaddons -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} ${{ env.COMMON_CMAKE_OPTIONS }} -DWITH_WAYLAND=OFF -DWITH_X11=OFF
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-kguiaddons --config Release --target install

    - name: Build KWidgetsAddons
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch ${{ env.KF_VERSION }} https://invent.kde.org/frameworks/kwidgetsaddons.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-kwidgetsaddons -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S kwidgetsaddons -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} ${{ env.COMMON_CMAKE_OPTIONS }}
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-kwidgetsaddons --config Release --target install

    - name: Configure KColorScheme
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch ${{ env.KF_VERSION }} https://invent.kde.org/frameworks/kcolorscheme.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-kcolorscheme -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S kcolorscheme -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} ${{ env.COMMON_CMAKE_OPTIONS }}

    - name: Build KColorScheme
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-kcolorscheme --config Release --target install

    - name: Build KConfigWidgets
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch ${{ env.KF_VERSION }} https://invent.kde.org/frameworks/kconfigwidgets.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-kconfigwidgets -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S kconfigwidgets -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} ${{ env.COMMON_CMAKE_OPTIONS }}
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-kconfigwidgets --config Release --target install

    - name: Build Breeze Icons
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      continue-on-error: true
      run: |
        git clone --depth 1 --branch ${{ env.KF_VERSION }} https://invent.kde.org/frameworks/breeze-icons.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-breeze-icons -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S breeze-icons -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} -DICONS_LIBRARY=ON -DSKIP_INSTALL_ICONS=ON
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-breeze-icons --config Release --target install
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-breeze-icons --config Release --target install # To workaround some bug

    - name: Build KIconThemes
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch ${{ env.KF_VERSION }} https://invent.kde.org/frameworks/kiconthemes.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-kiconthemes -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S kiconthemes -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} ${{ env.COMMON_CMAKE_OPTIONS }}
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-kiconthemes --config Release --target install

    - name: Build Sonnet
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch ${{ env.KF_VERSION }} https://invent.kde.org/frameworks/sonnet.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-sonnet -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S sonnet -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} ${{ env.COMMON_CMAKE_OPTIONS }}
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-sonnet --config Release --target install

    - name: Build KCompletion
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch ${{ env.KF_VERSION }} https://invent.kde.org/frameworks/kcompletion.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-kcompletion -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S kcompletion -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} ${{ env.COMMON_CMAKE_OPTIONS }}
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-kcompletion --config Release --target install

    - name: Build KTextWidgets
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch ${{ env.KF_VERSION }} https://invent.kde.org/frameworks/ktextwidgets.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-ktextwidgets -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S ktextwidgets -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} ${{ env.COMMON_CMAKE_OPTIONS }} -DWITH_TEXT_TO_SPEECH=OFF
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-ktextwidgets --config Release --target install

    - name: Build KXmlGui
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch ${{ env.KF_VERSION }} https://invent.kde.org/frameworks/kxmlgui.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-kxmlgui -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S kxmlgui -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} ${{ env.COMMON_CMAKE_OPTIONS }} -DFORCE_DISABLE_KGLOBALACCEL=ON
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-kxmlgui --config Release --target install

    - name: Build glm
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/g-truc/glm.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-glm -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S glm -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} -DGLM_BUILD_TESTS=OFF
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-glm --config Release --target install

    - name: Build nlohmann
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/nlohmann/json.git
        cmake -B ${{ steps.strings.outputs.build-output-dir }}-nlohmann -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }} -DCMAKE_BUILD_TYPE=Release -S json -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.prefix-dir }} -DJSON_BuildTests=OFF
        cmake --build ${{ steps.strings.outputs.build-output-dir }}-nlohmann --config Release --target install

    - name: Build stb
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/nothings/stb.git
        mv stb/* ${{ steps.strings.outputs.prefix-dir }}/include

    - name: Save Prefix
      id: cache-prefix-save
      uses: actions/cache/save@v5
      if: steps.cache-prefix-restore.outputs.cache-hit != 'true'
      with:
        path: ${{ steps.strings.outputs.prefix-dir }}
        key: ${{ steps.cache-prefix-restore.outputs.cache-primary-key }}

    - name: Configure
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_PREFIX_PATH=${{ steps.strings.outputs.prefix-dir }}
        -DCMAKE_INSTALL_PREFIX=${{ steps.strings.outputs.build-output-dir }}/bin
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config Release --target install

    - name: Copy required DLLs
      run: |
        Copy-Item -Path ${{ steps.strings.outputs.prefix-dir }}/bin/KF6BreezeIcons.dll -Destination ${{ steps.strings.outputs.build-output-dir }}/bin/bin
        Copy-Item -Path ${{ steps.strings.outputs.prefix-dir }}/bin/KF6ItemViews.dll -Destination ${{ steps.strings.outputs.build-output-dir }}/bin/bin
        Copy-Item -Path ${{ steps.strings.outputs.prefix-dir }}/bin/KF6IconWidgets.dll -Destination ${{ steps.strings.outputs.build-output-dir }}/bin/bin
        Copy-Item -Path ${{ steps.strings.outputs.prefix-dir }}/bin/KF6GuiAddons.dll -Destination ${{ steps.strings.outputs.build-output-dir }}/bin/bin
        Copy-Item -Path ${{ steps.strings.outputs.prefix-dir }}/bin/KF6ColorScheme.dll -Destination ${{ steps.strings.outputs.build-output-dir }}/bin/bin
        Copy-Item -Path ${{ steps.strings.outputs.prefix-dir }}/bin/intl-8.dll -Destination ${{ steps.strings.outputs.build-output-dir }}/bin/bin
        Copy-Item -Path ${{ steps.strings.outputs.prefix-dir }}/bin/KF6IconThemes.dll -Destination ${{ steps.strings.outputs.build-output-dir }}/bin/bin
        Copy-Item -Path ${{ steps.strings.outputs.prefix-dir }}/bin/iconv.dll -Destination ${{ steps.strings.outputs.build-output-dir }}/bin/bin
        Copy-Item -Path ${{ steps.strings.outputs.prefix-dir }}/bin/z.dll -Destination ${{ steps.strings.outputs.build-output-dir }}/bin/bin
        Copy-Item -Path ${{ steps.strings.outputs.prefix-dir }}/bin/KF6XmlGui.dll -Destination ${{ steps.strings.outputs.build-output-dir }}/bin/bin
        Copy-Item -Path ../Qt/${{ env.QT_VERSION }}/msvc2022_64/bin/Qt6PrintSupport.dll -Destination ${{ steps.strings.outputs.build-output-dir }}/bin/bin
        if (!(Test-Path "${{ steps.strings.outputs.build-output-dir }}/bin/plugins/sqldrivers")) {
            New-Item -ItemType Directory -Path "${{ steps.strings.outputs.build-output-dir }}/bin/plugins/sqldrivers"
        }
        Copy-Item -Path "../Qt/${{ env.QT_VERSION }}/msvc2022_64/plugins/sqldrivers/qsqlite.dll" -Destination "${{ steps.strings.outputs.build-output-dir }}/bin/plugins/sqldrivers"

    - name: Remove extra files
      run: |
        Remove-Item -Path ${{ steps.strings.outputs.build-output-dir }}/bin/bin/opengl32sw.dll
        Remove-Item -Path ${{ steps.strings.outputs.build-output-dir }}/bin/Release -Force -Recurse

    - name: Archive artifacts
      uses: actions/upload-artifact@v7
      with:
        name: novus-windows-x86_64
        path: ${{ steps.strings.outputs.build-output-dir }}/bin

  flatpak:
    name: "Flatpak"

    # Skip running on PR events that come from the same repository, it will just duplicate the branch action
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name

    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    strategy:
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.variant.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: true
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: novus.flatpak
          manifest-path: zone.xiv.novus.yml
          cache-key: flatpak-builder-${{ github.sha }}
          arch: ${{ matrix.variant.arch }}
          verbose: true
